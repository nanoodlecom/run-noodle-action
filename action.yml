name: "Run nanoodle workflow"
description: >-
  Run a saved nanoodle graph (noodle-graph.json) in CI — generate images,
  audio, video, or text via the NanoGPT API from a workflow you designed
  visually at nanoodle.com.
author: "nanoodle contributors"

branding:
  icon: "share-2"
  color: "purple"

inputs:
  graph:
    description: >-
      The graph to run: either a path to a saved graph (noodle-graph.json) in
      your repo, or a nanoodle share link — a full https:// share URL, a
      da.gd/TinyURL short link, or a bare #g=/#j=/#a= fragment. Paste the link
      you get from the editor's Share button and CI runs that pipeline; no file
      needed.
    required: true
  api-key:
    description: >-
      NanoGPT API key. Pass a secret: ${{ secrets.NANOGPT_API_KEY }}.
      Every run spends real balance.
    required: true
  inputs:
    description: >-
      Workflow inputs, one KEY=VALUE per line (blank lines and #-comments
      ignored). Same keys as `nanoodle inspect` shows, e.g. "Text=a cozy
      ramen shop" or "n2.system=@style.txt".
    required: false
    default: ""
  set:
    description: >-
      Setting overrides, one node.setting=value per line, e.g.
      "n3.model=flux-dev" or "n3.size=1024x1024".
    required: false
    default: ""
  out-dir:
    description: "Directory where media outputs and the result JSON are written."
    required: false
    default: "nanoodle-out"
  timeout-ms:
    description: "Overall run timeout in milliseconds (optional)."
    required: false
    default: ""
  nanoodle-version:
    description: >-
      Exact nanoodle CLI version to run (pinned, not floating). Share-link
      graphs require >=0.2.0; local media nodes require >=0.4.0.
    required: false
    default: "0.4.0"

outputs:
  out-dir:
    description: "Directory containing saved media outputs and the result JSON."
    value: ${{ steps.run.outputs.out-dir }}
  cost-usd:
    description: "Total cost of the run in USD as reported by NanoGPT."
    value: ${{ steps.run.outputs.cost-usd }}
  result-json:
    description: "Path to the machine-readable result JSON (outputs, cost, per-node statuses)."
    value: ${{ steps.run.outputs.result-json }}

runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: "20"
    - id: run
      shell: bash
      run: node "${{ github.action_path }}/scripts/run.mjs"
      env:
        # Composite actions do not get the implicit INPUT_* mapping — pass explicitly.
        INPUT_GRAPH: ${{ inputs.graph }}
        INPUT_API_KEY: ${{ inputs.api-key }}
        INPUT_INPUTS: ${{ inputs.inputs }}
        INPUT_SET: ${{ inputs.set }}
        INPUT_OUT_DIR: ${{ inputs.out-dir }}
        INPUT_TIMEOUT_MS: ${{ inputs.timeout-ms }}
        INPUT_NANOODLE_VERSION: ${{ inputs.nanoodle-version }}
