# ------------------------------------------------------------------
# DEMO ONLY — this workflow SPENDS real NanoGPT balance on every run.
# That is why it triggers on workflow_dispatch only (a manual button),
# never on push. Set the NANOGPT_API_KEY repository secret first.
# ------------------------------------------------------------------
name: nanoodle demo

on:
  workflow_dispatch:
    inputs:
      idea:
        description: "What should the image be about?"
        required: false
        default: "a cozy ramen shop on a rainy night"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run nanoodle workflow (spends NanoGPT balance)
        id: noodle
        uses: ./ # in your repo: nanoodlecom/run-noodle-action@v1
        with:
          graph: examples/noodle-graph.json
          api-key: ${{ secrets.NANOGPT_API_KEY }}
          inputs: |
            n1.text=${{ inputs.idea }}

      - name: Show cost
        run: echo "Run cost USD ${{ steps.noodle.outputs.cost-usd }}"

      - name: Upload generated media
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nanoodle-out
          path: ${{ steps.noodle.outputs.out-dir }}
